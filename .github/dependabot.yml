version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule: { interval: weekly }
    groups:
      nuget-dependencies: { patterns: ["*"] }
  - package-ecosystem: cargo
    directory: /
    schedule: { interval: weekly }
    groups:
      rust-dependencies: { patterns: ["*"] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      workflow-actions: { patterns: ["*"] }
