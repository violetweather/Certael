name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests and native library
        run: cargo test --workspace --release
      - name: Build native library
        run: cargo build --release -p certael-c-api
      - name: .NET build and tests
        run: dotnet test Certael.slnx -c Release --warnaserror
      - name: C ABI smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            clang -std=c17 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/c_abi_smoke.c target/release/libcertael_c_api.a -framework Security -framework CoreFoundation -o /tmp/certael-abi
          else
            cc -std=c17 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/c_abi_smoke.c target/release/libcertael_c_api.a -ldl -lpthread -lm -o /tmp/certael-abi
          fi
          /tmp/certael-abi

  cross-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: x86_64-pc-windows-gnu,x86_64-unknown-linux-gnu
      - run: cargo check --workspace --target x86_64-pc-windows-gnu
      - run: cargo check --workspace --target x86_64-unknown-linux-gnu

  persistence-integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: certael
          POSTGRES_PASSWORD: development-only
          POSTGRES_DB: certael
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U certael"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
    env:
      CERTAEL_TEST_POSTGRES: Host=127.0.0.1;Port=5432;Database=certael;Username=certael;Password=development-only
      CERTAEL_TEST_REDIS: 127.0.0.1:6379,abortConnect=false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test Certael.slnx -c Release --filter Category=Integration --warnaserror
