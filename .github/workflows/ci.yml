name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typescript-sdk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { persist-credentials: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 22 }
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        working-directory: server-sdk/typescript
      - run: pnpm run build && pnpm run test
        working-directory: server-sdk/typescript

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Rust tests and native library
        run: cargo test --workspace --release --locked
      - name: Build reference WASM rule
        run: cargo build --release --locked --target wasm32-unknown-unknown -p certael-reference-repeated-reward-rule
      - name: Verify reference WASM ABI and sandbox
        run: cargo run --release --locked -p certael-wasm-check -- target/wasm32-unknown-unknown/release/certael_reference_repeated_reward_rule.wasm
      - name: Build standalone WASM host runtime
        run: cargo build --release --locked -p certael-wasm
      - name: Build Rust Node-API verifier
        run: cargo build --release --locked -p certael-node
      - name: Load Rust Node-API verifier
        run: node scripts/smoke-node-addon.mjs
      - name: Execute reference rule through Node-API runtime
        run: node scripts/smoke-node-wasm.mjs
      - name: Build native library
        run: cargo build --release --locked -p certael-c-api
        - name: .NET build and tests
          run: dotnet test Certael.slnx -c Release --warnaserror
          env:
            AVALONIA_TELEMETRY_OPTOUT: "1"
            CERTAEL_RUN_WASM_NATIVE_TESTS: "1"
      - name: Unity .NET Standard compatibility
        run: dotnet build engines/unity/Runtime/Certael.Unity.csproj -c Release --warnaserror
      - name: C ABI smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            clang -std=c17 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/c_abi_smoke.c target/release/libcertael_c_api.a -framework Security -framework CoreFoundation -o /tmp/certael-abi
          else
            cc -std=c17 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/c_abi_smoke.c target/release/libcertael_c_api.a -ldl -lpthread -lm -o /tmp/certael-abi
          fi
          /tmp/certael-abi
      - name: C++ wrapper smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            clang++ -std=c++20 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/cpp_abi_smoke.cpp target/release/libcertael_c_api.a -framework Security -framework CoreFoundation -o /tmp/certael-cpp
          else
            c++ -std=c++20 -Wall -Wextra -Werror -Iruntime/certael-c-api/include tests/native/cpp_abi_smoke.cpp target/release/libcertael_c_api.a -ldl -lpthread -lm -o /tmp/certael-cpp
          fi
          /tmp/certael-cpp
      - name: Godot Agent codec smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          c++ -std=c++20 -Wall -Wextra -Werror tests/native/godot_agent_codec_smoke.cpp -o /tmp/certael-godot-agent-codec
          /tmp/certael-godot-agent-codec

  godot-windows-msvc:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          targets: x86_64-pc-windows-msvc
      - name: Install pinned SCons
        shell: pwsh
        run: |
          $line = Get-Content build/dependencies.env | Where-Object { $_ -like "SCONS_VERSION=*" }
          if (-not $line) { throw "SCONS_VERSION is not pinned" }
          $version = ($line -split "=", 2)[1]
          python -m pip install "scons==$version"
          $actual = (scons --version | Out-String)
          if ($actual -notmatch [regex]::Escape($version)) {
            throw "Expected SCons $version, got: $actual"
          }
      - name: Build Windows Godot extension with MSVC
        shell: pwsh
        run: .\scripts\build.ps1 godot -Configuration Release -Jobs 2
      - name: Verify Windows package files
        shell: pwsh
        run: |
          $extension = "engines/godot/addons/certael/bin/certael.windows.template_release.x86_64.dll"
          $runtime = "engines/godot/addons/certael/bin/certael_c_api.dll"
          if (-not (Test-Path $extension)) { throw "Missing Godot extension: $extension" }
          if (-not (Test-Path $runtime)) { throw "Missing packaged Certael runtime: $runtime" }

  protocol-conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - name: Rust golden vector
        run: cargo run --locked --release -p certael-core --example interop_vector
      - name: .NET protocol vectors
        run: dotnet test tests/Certael.Server.Tests/Certael.Server.Tests.csproj -c Release --filter "FullyQualifiedName~ProtocolV1Tests|FullyQualifiedName~BootstrapTicketTests"

  persistence-integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: certael
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-certael-ci
          POSTGRES_DB: certael
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U certael"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
    env:
      CERTAEL_TEST_POSTGRES: Host=127.0.0.1;Port=5432;Database=certael;Username=certael;Password=${{ github.run_id }}-${{ github.run_attempt }}-certael-ci
      CERTAEL_TEST_REDIS: 127.0.0.1:6379,abortConnect=false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test Certael.slnx -c Release --filter Category=Integration --warnaserror

  dependency-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - name: RustSec audit
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit
      - name: NuGet vulnerability audit
        run: dotnet list Certael.slnx package --vulnerable --include-transitive

  sbom:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with: { toolchain: 1.97.0 }
      - run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - run: bash scripts/package-cyclonedx-sbom.sh /tmp/certael-rust-sbom-ci.tar.gz
      - run: tar -tzf /tmp/certael-rust-sbom-ci.tar.gz
