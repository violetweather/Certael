name: codeql

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule: [{ cron: "17 4 * * 2" }]

permissions: { contents: read }

jobs:
  analyze:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with: { persist-credentials: false }
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with: { languages: csharp, actions }
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with: { dotnet-version: 10.0.x }
      - run: dotnet build Certael.slnx -c Release --warnaserror
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc
