name: codeql

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule: [{ cron: "17 4 * * 2" }]

permissions: { contents: read }

jobs:
  analyze:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { persist-credentials: false }
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with: { languages: csharp, actions }
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with: { dotnet-version: 10.0.x }
      - run: dotnet build Certael.slnx -c Release --warnaserror
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc
