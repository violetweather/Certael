syntax = "proto3";
package certael.v1;

option csharp_namespace = "Certael.Protocol.V1";

message ActionEnvelope {
  uint32 protocol_major = 1;
  uint32 protocol_minor = 2;
  string session_id = 3;
  uint64 sequence = 4;
  bytes action_id = 5;
  string action_type = 6;
  string request_schema = 7;
  uint32 schema_version = 8;
  bytes session_binding_digest = 9;
  int64 client_monotonic_micros = 10;
  bytes payload = 11;
  bytes previous_action_digest = 12;
  bytes possession_proof = 13;
}

enum ActionOutcome {
  ACTION_OUTCOME_UNSPECIFIED = 0;
  ACCEPTED = 1;
  REJECTED = 2;
  INDETERMINATE = 3;
}

message ActionResult {
  bytes action_id = 1;
  ActionOutcome outcome = 2;
  string public_reason = 3;
  bytes authoritative_response = 4;
  uint64 authoritative_revision = 5;
}
