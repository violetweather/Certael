syntax = "proto3";
package certael.agent.v1;

option csharp_namespace = "Certael.Agent.Protocol.V1";

enum AgentRequirementModeV1 {
  AGENT_REQUIREMENT_MODE_DISABLED = 0;
  AGENT_REQUIREMENT_MODE_OPTIONAL = 1;
  AGENT_REQUIREMENT_MODE_REQUIRED = 2;
}

message AgentPolicyClaimsV1 {
  uint32 protocol_version = 1;
  string policy_id = 2;
  string game_id = 3;
  string environment_id = 4;
  AgentRequirementModeV1 requirement_mode = 5;
  uint32 heartbeat_seconds = 6;
  uint32 report_seconds = 7;
  uint32 disconnect_grace_seconds = 8;
  string minimum_agent_version = 9;
  int64 expires_at_unix = 10;
  string tenant_id = 11;
}

message SignedAgentPolicyV1 {
  bytes claims = 1;
  bytes signature = 2;
  string key_id = 3;
}

message AgentHelloV1 {
  uint32 protocol_version = 1;
  string agent_version = 2;
  bytes agent_public_key = 3;
  string build_id = 4;
  bytes executable_sha256 = 5;
}

message AgentLaunchGrantClaimsV1 {
  uint32 protocol_version = 1;
  string grant_id = 2;
  string tenant_id = 3;
  string game_id = 4;
  string environment_id = 5;
  string player_subject = 6;
  string match_id = 7;
  string build_id = 8;
  bytes agent_public_key = 9;
  int64 issued_at_unix = 10;
  int64 expires_at_unix = 11;
  bytes policy_digest = 12;
  string authoritative_server_id = 13;
  bytes build_manifest_digest = 14;
}

message SignedAgentLaunchGrantV1 {
  bytes claims = 1;
  bytes signature = 2;
  string key_id = 3;
}

// Exact payload sent over the inherited Agent channel after AgentHelloV1.
// All nested messages remain independently canonical and signed.
message AgentLaunchBundleV1 {
  bytes signed_policy = 1;
  bytes signed_launch_grant = 2;
  bytes signed_build_manifest = 3;
}

message ProtectedBuildFileV1 {
  string path = 1;
  uint64 size = 2;
  bytes sha256 = 3;
}

message BuildManifestClaimsV1 {
  uint32 protocol_version = 1;
  string manifest_id = 2;
  string tenant_id = 3;
  string game_id = 4;
  string environment_id = 5;
  string build_id = 6;
  repeated ProtectedBuildFileV1 files = 7;
  int64 not_before_unix = 8;
  int64 expires_at_unix = 9;
}

message SignedBuildManifestV1 {
  bytes claims = 1;
  bytes signature = 2;
  string key_id = 3;
}

message GameRegistrationClaimsV1 {
  uint32 protocol_version = 1;
  string registration_id = 2;
  string publisher_id = 3;
  string tenant_id = 4;
  string game_id = 5;
  string environment_id = 6;
  string executable_relative_path = 7;
  bytes trust_store_sha256 = 8;
  bytes update_root_sha256 = 9;
  string update_metadata_url = 10;
  string update_targets_url = 11;
  string update_channel = 12;
  int64 not_before_unix = 13;
  int64 expires_at_unix = 14;
}

message SignedGameRegistrationV1 {
  bytes claims = 1;
  bytes signature = 2;
  string key_id = 3;
}

message AgentReportChallengeV1 {
  string agent_session_id = 1;
  bytes nonce = 2;
  int64 expires_at_unix = 3;
}

message IntegrityObservationV1 {
  string code = 1;
  string value = 2;
}

message AgentIntegrityReportV1 {
  uint32 protocol_version = 1;
  string agent_session_id = 2;
  uint64 sequence = 3;
  bytes challenge_nonce = 4;
  int64 observed_at_unix = 5;
  string build_id = 6;
  bytes executable_sha256 = 7;
  repeated IntegrityObservationV1 observations = 8;
  bytes previous_report_digest = 9;
  bytes signature = 10;
}

message AgentHealthV1 {
  string agent_session_id = 1;
  string state = 2;
  int64 last_report_at_unix = 3;
  repeated string public_reasons = 4;
}

message AgentRevocationClaimsV1 {
  uint32 protocol_version = 1;
  string tenant_id = 2;
  string game_id = 3;
  string environment_id = 4;
  string agent_session_id = 5;
  string reason = 6;
  int64 revoked_at_unix = 7;
  int64 expires_at_unix = 8;
}

message SignedAgentRevocationV1 {
  bytes claims = 1;
  bytes signature = 2;
  string key_id = 3;
}

message AgentLaunchRequestV1 {
  string tenant_id = 1;
  string game_id = 2;
  string environment_id = 3;
  string player_subject = 4;
  string match_id = 5;
  string authoritative_server_id = 6;
  string build_id = 7;
  bytes agent_public_key = 8;
  string policy_id = 9;
  AgentRequirementModeV1 requirement_mode = 10;
  uint32 heartbeat_seconds = 11;
  uint32 report_seconds = 12;
  uint32 disconnect_grace_seconds = 13;
  string minimum_agent_version = 14;
  uint32 policy_lifetime_seconds = 15;
  uint32 session_lifetime_seconds = 16;
}

message AgentLaunchResponseV1 {
  string agent_session_id = 1;
  bytes signed_policy = 2;
  bytes signed_launch_grant = 3;
  int64 expires_at_unix = 4;
  bytes signed_build_manifest = 5;
}

message AgentOperationRequestV1 {
  string tenant_id = 1;
  string environment_id = 2;
  string authoritative_server_id = 3;
}

message AgentReportSubmissionV1 {
  string tenant_id = 1;
  string environment_id = 2;
  string authoritative_server_id = 3;
  bytes report = 4;
}

message AgentRevocationRequestV1 {
  string tenant_id = 1;
  string environment_id = 2;
  string authoritative_server_id = 3;
  string reason = 4;
}
