services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: certael
      POSTGRES_PASSWORD: ${CERTAEL_DEV_POSTGRES_PASSWORD:?Set CERTAEL_DEV_POSTGRES_PASSWORD to a random local-only value}
      POSTGRES_DB: certael
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certael"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    ports: ["127.0.0.1:5432:5432"]
  control-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: certael_coordinator
      POSTGRES_PASSWORD: ${CERTAEL_COORDINATOR_POSTGRES_PASSWORD:?Set CERTAEL_COORDINATOR_POSTGRES_PASSWORD}
      POSTGRES_DB: certael_control
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certael_coordinator"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["control-postgres-data:/var/lib/postgresql/data"]
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["127.0.0.1:6379:6379"]
  nats:
    image: nats:2.11-alpine
    command: ["-js", "-sd", "/data"]
    volumes: ["nats-data:/data"]
  clickhouse:
    image: clickhouse/clickhouse-server:25-alpine
  api:
    build:
      context: ../..
      dockerfile: backend/Certael.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: ${CERTAEL_DEV_POSTGRES_CONNECTION_STRING:?Set CERTAEL_DEV_POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: redis:6379,abortConnect=false
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
  event-worker:
    build:
      context: ../..
      dockerfile: backend/Certael.EventWorker/Dockerfile
    environment:
      ConnectionStrings__Postgres: ${CERTAEL_DEV_POSTGRES_CONNECTION_STRING:?Set CERTAEL_DEV_POSTGRES_CONNECTION_STRING}
      Nats__Url: nats://nats:4222
      EventWorker__AuthorizedTenants__0: development
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
  analytics-worker:
    build:
      context: ../..
      dockerfile: backend/Certael.AnalyticsWorker/Dockerfile
    environment:
      ConnectionStrings__Postgres: ${CERTAEL_DEV_POSTGRES_CONNECTION_STRING:?Set CERTAEL_DEV_POSTGRES_CONNECTION_STRING}
      Nats__Url: nats://nats:4222
      ClickHouse__Url: http://clickhouse:8123
      ClickHouse__Database: default
      AnalyticsWorker__ConsumerName: certael-clickhouse-v1
      AnalyticsWorker__AuthorizedTenants__0: development
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      clickhouse: { condition: service_started }
  coordinator:
    build:
      context: ../..
      dockerfile: backend/Certael.Coordinator/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ControlPostgres: ${CERTAEL_COORDINATOR_POSTGRES_CONNECTION_STRING:?Set CERTAEL_COORDINATOR_POSTGRES_CONNECTION_STRING}
      Coordinator__SigningKeyId: ${CERTAEL_COORDINATOR_SIGNING_KEY_ID:-development-transfer-key}
      Coordinator__SigningPrivateKeyPkcs8Base64: ${CERTAEL_COORDINATOR_SIGNING_KEY_PKCS8:?Set CERTAEL_COORDINATOR_SIGNING_KEY_PKCS8}
    ports: ["8082:8080"]
    depends_on:
      control-postgres: { condition: service_healthy }
volumes:
  postgres-data:
  control-postgres-data:
  nats-data:
